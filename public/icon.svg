  <!-- Header bar -->
  <rect x="72" y="72" width="368" height="88" rx="24" fill="#3b82f6"/>
  <rect x="72" y="128" width="368" height="32" fill="#3b82f6"/>
  <!-- Grid cells - row 1 -->
  <rect x="96"  y="192" width="72" height="40" rx="6" fill="#10b981" opacity="0.85"/>
  <rect x="184" y="192" width="72" height="40" rx="6" fill="#f59e0b" opacity="0.85"/>
  <rect x="272" y="192" width="72" height="40" rx="6" fill="#8b5cf6" opacity="0.85"/>
  <rect x="360" y="192" width="72" height="40" rx="6" fill="#3b82f6" opacity="0.85"/>
  <!-- Grid cells - row 2 -->
  <rect x="96"  y="248" width="72" height="40" rx="6" fill="#f59e0b" opacity="0.85"/>
  <rect x="184" y="248" width="72" height="40" rx="6" fill="#10b981" opacity="0.85"/>
  <rect x="272" y="248" width="160" height="40" rx="6" fill="#ec4899" opacity="0.85"/>
  <!-- Grid cells - row 3 -->
  <rect x="96"  y="304" width="160" height="40" rx="6" fill="#8b5cf6" opacity="0.85"/>
  <rect x="272" y="304" width="72" height="40" rx="6" fill="#f59e0b" opacity="0.85"/>
