  <rect x="184" y="360" width="72" height="56" rx="6" fill="#ec4899" opacity="0.85"/>
  <rect x="272" y="360" width="72" height="56" rx="6" fill="#10b981" opacity="0.85"/>
  <rect x="360" y="360" width="72" height="56" rx="6" fill="#f59e0b" opacity="0.85"/>
  <!-- Calendar title dots in header -->
  <circle cx="160" cy="116" r="8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="256" cy="116" r="8" fill="rgba(255,255,255,0.9)"/>
  <circle cx="352" cy="116" r="8" fill="rgba(255,255,255,0.6)"/>
