<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Study Planner">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>Study Planner – April 2026</title>
</head>
<body>

<div id="toolbar">
  <h1>
    <svg id="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" aria-hidden="true">
      <!-- card body -->
      <rect x="3" y="5" width="30" height="28" rx="4" fill="#3b82f6"/>
      <!-- header stripe -->
      <rect x="3" y="5" width="30" height="9" rx="4" fill="#2563eb"/>
      <rect x="3" y="10" width="30" height="4" fill="#2563eb"/>
      <!-- ring holes -->
      <rect x="11" y="2" width="4" height="7" rx="2" fill="#1d4ed8"/>
      <rect x="21" y="2" width="4" height="7" rx="2" fill="#1d4ed8"/>
      <!-- grid cells row 1 -->
      <rect x="7"  y="18" width="6" height="4" rx="1" fill="#ffffff" opacity="0.9"/>
      <rect x="15" y="18" width="6" height="4" rx="1" fill="#10b981" opacity="0.9"/>
      <rect x="23" y="18" width="6" height="4" rx="1" fill="#f59e0b" opacity="0.9"/>
      <!-- grid cells row 2 -->
      <rect x="7"  y="24" width="6" height="4" rx="1" fill="#ec4899" opacity="0.9"/>
      <rect x="15" y="24" width="14" height="4" rx="1" fill="#8b5cf6" opacity="0.9"/>
      <!-- pencil -->
      <g transform="translate(22,22) rotate(-40)">
        <rect x="-2.5" y="-9" width="5" height="13" rx="1" fill="#fde68a"/>
        <polygon points="-2.5,4 2.5,4 0,8" fill="#f59e0b"/>
        <rect x="-2.5" y="-11" width="5" height="3" rx="0.5" fill="#d1d5db"/>
        <rect x="-2.5" y="-9" width="5" height="1.5" fill="#fbbf24"/>
      </g>
    </svg>
    Study Planner – April 2026
  </h1>
  <div id="presets"></div>
  <div id="tools">
    <button class="tool-btn" id="undo-btn" title="Undo (Ctrl+Z)" disabled>↩ Undo</button>
    <button class="tool-btn" id="redo-btn" title="Redo (Ctrl+Y / Ctrl+Shift+Z)" disabled>↪ Redo</button>
    <button class="tool-btn" id="erase-btn" title="Toggle eraser (E)">⌫ Erase</button>
    <button class="tool-btn" id="settings-btn" title="Configure preset names &amp; colors">⚙ Presets</button>
  </div>
  <span id="hint">Keys 1–0: select preset &nbsp;·&nbsp; E: eraser &nbsp;·&nbsp; Drag: paint &nbsp;·&nbsp; Dbl-click block: add label &nbsp;·&nbsp; Right-click: erase</span>
</div>

<div id="grid-wrapper">
  <table id="grid"></table>
</div>

<!-- Text edit modal -->
<div class="modal-backdrop" id="text-modal">
  <div class="modal-box" style="min-width:340px;">
    <h2>Edit Label</h2>
    <p class="cell-info" id="text-modal-info"></p>
    <textarea id="text-input" placeholder="What are you studying?&#10;(Ctrl+Enter to save)"></textarea>
    <div class="modal-footer">
      <button class="btn btn-danger" id="text-clear-btn">Remove label</button>
      <button class="btn btn-secondary" id="text-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="text-save-btn">Save</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-backdrop" id="settings-modal">
  <div class="modal-box" style="min-width:320px;">
    <h2>Color Presets</h2>
    <div id="presets-edit"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="settings-reset-btn">Reset defaults</button>
      <button class="btn btn-primary" id="settings-close-btn">Done</button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
